# ═══════════════════════════════════════════════════════════════
# workers/wrangler.worker.toml
# Config RIÊNG cho geo-sync Worker — tách biệt với Pages project
#
# Dùng bởi: npm run worker:deploy
# Lệnh:     npx wrangler deploy workers/geo-sync.ts --config workers/wrangler.worker.toml
#
# KHÔNG có `pages_build_output_dir` — đây là Worker thuần túy,
# không phải Pages. Đây chính là nguyên nhân lỗi hình 1.
# ═══════════════════════════════════════════════════════════════

name               = "shelby-geo-sync"
main               = "geo-sync.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── KV Namespaces ──────────────────────────────────────────────
# Dùng cùng namespace IDs với Pages project (wrangler.toml gốc)
# Paste ID sau khi chạy:
#   npx wrangler kv:namespace create "SHELBY_KV_MAINNET"

[[kv_namespaces]]
binding = "SHELBY_KV_MAINNET"
id      = "5cb5ee699b924052812beda7ae936569"

[[kv_namespaces]]
binding = "SHELBY_KV_TESTNET"
id      = "416bad6c5ca74ffb8281261b64692f3e"

# ── R2 Bucket ─────────────────────────────────────────────────
[[r2_buckets]]
binding     = "SHELBY_R2"
bucket_name = "shelby-analytics-snapshots"

# ── CRON — chạy mỗi giờ ───────────────────────────────────────
[triggers]
crons = ["0 * * * *"]